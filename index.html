<script>

async function startSearch(){

  const input = document.getElementById("linkInput").value.trim();

  if(!input){
    alert("Paste video link first");
    return;
  }

  document.getElementById("result").style.display = "none";
  document.getElementById("loader").style.display = "block";

  try{

    const response = await fetch("https://tribex-backend.onrender.com/api/info",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        url:input
      })
    });

    const data = await response.json();

    document.getElementById("loader").style.display = "none";
    document.getElementById("result").style.display = "block";

    document.getElementById("videoLink").innerText = data.url;

    const thumb = document.querySelector(".thumb");

    thumb.innerHTML = `
      <img src="${data.thumbnail}"
      style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
    `;

    saveHistory(input);

  }catch(err){

    document.getElementById("loader").style.display = "none";

    alert("Backend connection error");

    console.log(err);
  }
}

document.querySelectorAll(".row .btn").forEach(btn=>{

  btn.onclick = function(){

    window.open("https://tribex-backend.onrender.com/api/download");

  }

});

function saveHistory(link){

  let history = JSON.parse(localStorage.getItem("tribexHistory")) || [];

  history.unshift(link);

  history = history.slice(0,5);

  localStorage.setItem("tribexHistory", JSON.stringify(history));

  showHistory();
}

function showHistory(){

  let history = JSON.parse(localStorage.getItem("tribexHistory")) || [];

  const box = document.getElementById("historyBox");

  box.innerHTML = history.length
    ? history.map(item=>`<p>${item}</p>`).join("")
    : "<p>No search yet.</p>";
}

function toggleMode(){

  document.body.classList.toggle("dark");

  localStorage.setItem(
    "tribexMode",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
}

if(localStorage.getItem("tribexMode")==="dark"){

  document.body.classList.add("dark");

}

showHistory();

</script>
